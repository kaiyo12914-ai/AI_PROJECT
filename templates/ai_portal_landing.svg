<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- 
    AI (Prototype) Assistant Portal SVG
    Theme: Light Tech, Modular, Professional
    Target: MPC AI Portal Landing
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

    :root {
      --bg-color: #ffffff;
      --panel-bg: #f8f9fa;
      --text-main: #2d3436;
      --text-sub: #636e72;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
      --card-hover-shadow: 0 8px 24px rgba(0,0,0,0.12);
      
      /* Card Colors */
      --c-blue: #0984e3;
      --c-green: #00b894;
      --c-teal: #00cec9;
      --c-red: #d63031;
      --c-orange: #e17055;
      --c-indigo: #6c5ce7;
      --c-grayblue: #4b6584;
    }

    text { font-family: 'Noto Sans TC', sans-serif; pointer-events: none; }

    /* Base Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes lineFlow { 0% { stroke-dashoffset: 100; opacity: 0; } 50% { opacity: 0.3; } 100% { stroke-dashoffset: 0; opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    .bg-main { fill: var(--bg-color); animation: fadeIn 1s ease-out forwards; }
    .panel { fill: var(--panel-bg); transform-origin: center; animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .title-group { animation: fadeIn 1s ease-out 0.3s both; }
    .welcome-tag { animation: fadeIn 1s ease-out 0.5s both; }

    /* Card Interaction */
    .card { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-5px); filter: brightness(1.05); }
    .card:hover rect { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
    .card:active { transform: translateY(-2px) scale(0.98); }

    /* Entrance Sequence */
    .card-entry { opacity: 0; animation: slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    /* Decorative Elements */
    .deco-line { stroke: var(--c-blue); stroke-dasharray: 50; stroke-width: 1; opacity: 0; animation: lineFlow 4s linear infinite; }
    .deco-dot { fill: var(--c-teal); animation: pulse 2s infinite ease-in-out; }
  </style>

  <!-- Background Layer -->
  <rect width="1000" height="700" class="bg-main" />
  
  <!-- Data Flow Decoratives -->
  <g class="decoratives" opacity="0.3">
    <path d="M50,100 Q250,50 450,100" class="deco-line" style="animation-delay: 0s" fill="none"/>
    <path d="M600,600 Q800,650 950,550" class="deco-line" style="animation-delay: 2s" fill="none"/>
    <circle cx="920" cy="80" r="3" class="deco-dot" style="animation-delay: 0.5s" />
    <circle cx="80" cy="620" r="4" class="deco-dot" style="animation-delay: 1.2s" />
  </g>

  <!-- Main Central Panel -->
  <rect x="50" y="40" width="900" height="620" rx="24" class="panel" />

  <!-- Header Section -->
  <g class="title-group">
    <text x="500" y="100" text-anchor="middle" font-size="32" font-weight="700" fill="var(--text-main)">AI（雛形）輔助系統入口</text>
    <text x="500" y="135" text-anchor="middle" font-size="16" fill="var(--text-sub)"></text>
  </g>

  <g class="welcome-tag">
    <rect x="760" y="75" width="150" height="32" rx="16" fill="#e9ecef" />
    <text x="835" y="96" text-anchor="middle" font-size="13" fill="#495057">歡迎：MPC-姚羿佑</text>
  </g>

  <!-- Grid Guide: 5 columns, 2 rows -->
  <!-- Card Settings: Width 160, Height 180, Gap 20 -->

  <!-- Card 1: Translation -->
  <g class="card card-entry" style="animation-delay: 0.6s">
    <rect x="90" y="180" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="110" y="205" width="40" height="4" rx="2" fill="var(--c-blue)" />
    <text x="110" y="240" font-size="18" font-weight="700" fill="var(--text-main)">翻譯工具</text>
    <text x="110" y="270" font-size="13" fill="var(--text-sub)">中英 / 多語翻譯</text>
    <text x="110" y="295" font-size="11" fill="#abb5be" font-weight="300">TRANS_TOOL_v1</text>
  </g>

  <!-- Card 2: Performance Review -->
  <g class="card card-entry" style="animation-delay: 0.7s">
    <rect x="270" y="180" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="290" y="205" width="40" height="4" rx="2" fill="var(--c-green)" />
    <text x="290" y="240" font-size="18" font-weight="700" fill="var(--text-main)">考績評量工具</text>
    <text x="290" y="270" font-size="13" fill="var(--text-sub)">評語建議與文字優化</text>
  </g>

  <!-- Card 3: Instructions Reply -->
  <g class="card card-entry" style="animation-delay: 0.8s">
    <rect x="450" y="180" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="470" y="205" width="40" height="4" rx="2" fill="var(--c-teal)" />
    <text x="470" y="240" font-size="18" font-weight="700" fill="var(--text-main)">指裁事項擬答</text>
    <text x="470" y="270" font-size="13" fill="var(--text-sub)">RAG 輔助擬答</text>
  </g>

  <!-- Card 4: Document Helper -->
  <g class="card card-entry" style="animation-delay: 0.9s">
    <rect x="630" y="180" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="650" y="205" width="40" height="4" rx="2" fill="var(--c-indigo)" />
    <text x="650" y="240" font-size="18" font-weight="700" fill="var(--text-main)">簽文輔助系統</text>
    <text x="650" y="270" font-size="13" fill="var(--text-sub)">公文、簽呈撰寫輔助</text>
  </g>

  <!-- Card 5: Vanna SQL -->
  <g class="card card-entry" style="animation-delay: 1.0s">
    <rect x="810" y="180" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="830" y="205" width="40" height="4" rx="2" fill="var(--c-grayblue)" />
    <text x="830" y="240" font-size="18" font-weight="700" fill="var(--text-main)">Vanna / SQL</text>
    <text x="830" y="270" font-size="13" fill="var(--text-sub)">智慧查詢 / 問答</text>
  </g>

  <!-- Card 6: OCR Screenshot -->
  <g class="card card-entry" style="animation-delay: 1.1s">
    <rect x="90" y="380" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="110" y="405" width="40" height="4" rx="2" fill="var(--c-orange)" />
    <text x="110" y="440" font-size="18" font-weight="700" fill="var(--text-main)">截圖 → 文字</text>
    <text x="110" y="470" font-size="13" fill="var(--text-sub)">圖表 / 流程圖轉文字</text>
  </g>

  <!-- Card 7: PDF Converter -->
  <g class="card card-entry" style="animation-delay: 1.2s">
    <rect x="270" y="380" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="290" y="405" width="40" height="4" rx="2" fill="var(--c-red)" />
    <text x="290" y="440" font-size="18" font-weight="700" fill="var(--text-main)">PDF → Word</text>
    <text x="290" y="470" font-size="13" fill="var(--text-sub)">PDF 轉文字 / DOCX</text>
  </g>

  <!-- Card 8: Text to PPT -->
  <g class="card card-entry" style="animation-delay: 1.3s">
    <rect x="450" y="380" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="470" y="405" width="40" height="4" rx="2" fill="var(--c-orange)" />
    <text x="470" y="440" font-size="18" font-weight="700" fill="var(--text-main)">文字 → PPTX</text>
    <text x="470" y="470" font-size="13" fill="var(--text-sub)">文字自動產生簡報</text>
  </g>

  <!-- Card 9: Voice AI -->
  <g class="card card-entry" style="animation-delay: 1.4s">
    <rect x="630" y="380" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="650" y="405" width="40" height="4" rx="2" fill="var(--c-blue)" />
    <text x="650" y="440" font-size="18" font-weight="700" fill="var(--text-main)">語音 / 文字</text>
    <text x="650" y="470" font-size="13" fill="var(--text-sub)">TTS / STT 轉換</text>
  </g>

  <!-- Card 10: Usage Record -->
  <g class="card card-entry" style="animation-delay: 1.5s">
    <rect x="810" y="380" width="160" height="180" rx="16" fill="white" stroke-width="1" stroke="#eee" />
    <rect x="830" y="405" width="40" height="4" rx="2" fill="#d1d8e0" />
    <text x="830" y="440" font-size="18" font-weight="700" fill="var(--text-main)">使用紀錄</text>
    <text x="830" y="470" font-size="13" fill="var(--text-sub)">Portal 紀錄查詢</text>
  </g>

  <!-- Bottom Info -->
  <text x="500" y="630" text-anchor="middle" font-size="12" fill="#bdc3c7" animation="fadeIn 2s ease-out 2s both">© 2026 MPC AI Laboratory | 僅供內部測試使用</text>

</svg>