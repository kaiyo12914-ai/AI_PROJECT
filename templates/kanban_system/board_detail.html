<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>{{ board.name }} - 看板系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kanban-board { display: flex; overflow-x: auto; padding: 20px; gap: 20px; }
        .kanban-column { width: 320px; min-width: 320px; background: #f4f5f7; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
        .kanban-card { background: white; border-radius: 4px; padding: 12px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: grab; }
        .kanban-card:active { cursor: grabbing; }
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">{{ board.name }}</h1>
        <div class="flex gap-4">
            <button class="bg-blue-600 text-white px-4 py-2 rounded">新增任務</button>
            <a href="." class="text-gray-600 hover:text-gray-900">返回列表</a>
        </div>
    </header>

    <main class="kanban-board h-[calc(100vh-64px)]">
        {% for column in columns %}
        <div class="kanban-column shadow-sm">
            <h2 class="text-lg font-semibold px-2 mb-4 text-gray-700 flex justify-between">
                {{ column.name }}
                <span class="text-sm bg-gray-200 px-2 py-0.5 rounded-full">{{ column.cards.count }}</span>
            </h2>
            <div class="flex-grow overflow-y-auto">
                {% for card in column.cards.all %}
                <div class="kanban-card priority-{{ card.priority }}">
                    <h3 class="font-bold text-gray-800">{{ card.title }}</h3>
                    <p class="text-sm text-gray-600 mt-2 line-clamp-2">{{ card.goal }}</p>
                    <div class="mt-4 flex justify-between items-center text-xs text-gray-400">
                        <span>#{{ card.id }}</span>
                        <span class="px-2 py-0.5 bg-gray-100 rounded">{{ card.get_priority_display }}</span>
                    </div>
                </div>
                {% empty %}
                <div class="text-center py-10 text-gray-400 italic">無任務</div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </main>
</body>
</html>
