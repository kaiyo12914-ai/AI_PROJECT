{% load static %}
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'portal/img/favicon-ai.png' %}?v=3">
  <link rel="icon" type="image/svg+xml" href="{% static 'portal/img/favicon-ai.svg' %}?v=3">
  <link rel="shortcut icon" href="{% static 'portal/img/favicon-ai.png' %}?v=3">
  <title>GRAPH → TEXT</title>
  <link rel="stylesheet" href="{% static 'graph2doc/css/index.css' %}">
  <script defer src="{% static 'portal/js/apiurl_factory.js' %}"></script>
</head>
<body data-base-url="{{ request.script_name }}">
<div class="wrap">
  <div class="card">
    <h2 class="title">GRAPH → TEXT</h2>

    <div class="field">
      <div class="muted">標題</div>
      <input id="title" placeholder="例如：生產線異常趨勢分析" />
    </div>

    <div class="field">
      <div class="muted">上傳圖檔（可選）</div>
      <input id="image" type="file" accept="image/*" />
      <div class="muted hint">也可用下方「截圖貼上」直接 Ctrl+V。</div>
    </div>

    <div class="field">
      <div class="muted">補充說明（可選）</div>
      <textarea id="notes" placeholder="例如：此圖為 2025/12 月每日不良率..."></textarea>
    </div>

    <div class="row">
      <button id="go">產生文字</button>
      <button id="summary" type="button">文件摘要</button>
      <button id="copy" type="button">複製</button>
      <button id="downloadTxt" type="button">下載 TXT</button>
      <span class="muted status" id="status"></span>
    </div>
  </div>

  <div class="card section-gap">
    <div class="muted">輸出文字</div>
    <textarea id="out" placeholder="產生後會顯示在這裡" class="out-box"></textarea>
  </div>

  <div class="card section-gap">
    <div class="muted">文件摘要結果</div>
    <div id="summaryStatus" class="status muted"></div>
    <textarea id="summaryOut" placeholder="摘要結果會顯示在這裡" class="summary-box"></textarea>
  </div>

  <div class="card section-gap">
    <h3 class="sub-title">截圖貼上 / 上傳</h3>

    <div id="pasteZone">
      <div class="paste-main">可在此區域貼上圖片（Ctrl+V）或點擊選擇檔案</div>
      <div class="paste-sub">支援 PNG/JPG/WebP；上傳後會自動同步到主上傳欄位。</div>
      <input id="imgInput" type="file" accept="image/*" hidden>
    </div>

    <div class="preview-wrap">
      <img id="imgPreview" alt="preview" class="preview">
      <div id="uploadStatus" class="muted"></div>
    </div>
  </div>
</div>
<script defer src="{% static 'graph2doc/js/index.js' %}"></script>
</body>
</html>
