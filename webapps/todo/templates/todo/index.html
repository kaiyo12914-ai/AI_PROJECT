{% load static %}
{% load custom_tags %}
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
  <link rel="icon" type="image/svg+xml" href="{% custom_static 'portal/img/favicon-ai.svg' %}?v=3">
  <link rel="shortcut icon" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
  <title>待辦重點提醒</title>
  <link rel="stylesheet" href="{% custom_static 'todo/css/index.css' %}">
  <script defer src="{% custom_static 'portal/js/apiurl_factory.js' %}"></script>
</head>
<body data-base-url="{{ app_base_url }}">
  <div class="wrap">
    <h1>待辦重點提醒</h1>
    <div class="muted">取得個人待辦 JSON，排除「宣教宣導」，並提供 DeadlineDate 即將到期警示建議。</div>

    <div class="card">
      <div class="row">
        <button id="btnFetch">取得我的待辦</button>
        <span id="fetchStatus" class="muted"></span>
      </div>
    </div>

    <div class="card">
      <label>待辦事項（JSON）</label>
      <textarea id="todos" placeholder="待辦事項 JSON 會顯示在此..."></textarea>
    </div>

    <div class="card">
      <div class="row">
        <button id="btnPlan">產生到期警示建議</button>
        <button id="btnCopy" type="button">複製建議</button>
        <button id="btnDownload" type="button">下載 TXT</button>
        <span id="planStatus" class="muted"></span>
      </div>
    </div>

    <div class="card">
      <label>到期警示建議</label>
      <textarea id="planOut" class="out" placeholder="到期警示建議會顯示在此..."></textarea>
    </div>
  </div>
  <script defer src="{% custom_static 'todo/js/index.js' %}"></script>
</body>
</html>
