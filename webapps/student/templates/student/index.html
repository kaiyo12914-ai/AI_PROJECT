{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學生期末評語產生器（Django 範例）</title>
  <link rel="stylesheet" href="{% static 'student/css/index.css' %}">
  <script defer src="{% static 'portal/js/apiurl_factory.js' %}"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'portal/img/favicon-ai.png' %}?v=3">
  <link rel="icon" type="image/svg+xml" href="{% static 'portal/img/favicon-ai.svg' %}?v=3">
  <link rel="shortcut icon" href="{% static 'portal/img/favicon-ai.png' %}?v=3">
</head>
<body data-base-url="{{ request.script_name }}">
<div class="container">
    <h1>學生期末評語產生器（Django 範例）</h1>

    <!-- 上方工具列 -->
    <div class="toolbar">
        <button id="btnSave" class="secondary">儲存（暫存於瀏覽器）</button>
        <button id="btnTogglePreview" class="secondary">顯示/隱藏預覽</button>
        <button id="btnResetAll" class="danger">重設全部</button>
    </div>

    <!-- 學生清單 & 學生按鈕 -->
    <h3>學生清單（一行一個學生，格式：座號.姓名）</h3>
    <textarea id="studentList" placeholder="例：&#10;1.王小明&#10;2.林小華&#10;3.陳小美"></textarea>
    <div style="margin-top: 8px;">
        <input type="file" id="importFileInput" accept=".txt,.csv" style="display: none;">
        <button id="btnImportFile" class="secondary">匯入人員名單</button>
        <button id="btnGenerateStudents">產生學生按鈕</button>
    </div>

    <div id="studentButtons" class="student-buttons"></div>

    <div class="grid-2">
        <!-- 左側：特質選擇區 -->
        <div>
            <h3 class="section-header">
                <span>特質選擇：</span>
                <button id="btnResetTraits" class="secondary">重置特質</button>
            </h3>

            <!-- 分類分頁 -->
            <div id="traitTabs" class="pill-list" style="margin: 10px 0 8px;">
                <button type="button" class="tab-btn selected" data-tab="all">全部</button>
                <button type="button" class="tab-btn" data-tab="aptitude">資質與態度</button>
                <button type="button" class="tab-btn" data-tab="character">個性與品德</button>
                <button type="button" class="tab-btn" data-tab="social">團體與人際</button>
                <button type="button" class="tab-btn" data-tab="talent">專長與才藝</button>
            </div>

            <div id="traitList" class="card pill-list"></div>

            <h3 class="section-header" style="margin-top: 16px;">
                <span>新增自訂特質（最多20個）</span>
                <button id="btnClearCustomTraits" class="secondary">清除自訂特質</button>
            </h3>
            <div class="card">
                <div class="inline-input">
                    <input type="text" id="customTraitInput" placeholder="輸入自訂特質，例如：樂於助人">
                    <button id="btnAddCustomTrait">新增</button>
                </div>
                <div id="customTraitList" class="pill-list" style="margin-top: 10px;"></div>
                <div style="margin-top: 6px; font-size: 12px; color: #6b7280;">
                    已新增：<span id="customTraitCount">0</span> / 20
                </div>
            </div>

            <h3 class="section-header" style="margin-top: 16px;">
                <span>已選擇的特質：</span>
                <button id="btnClearSelectedTraits" class="secondary">清空已選特質</button>
            </h3>
            <div id="selectedTraits" class="card pill-list"></div>

            <div style="margin-top: 16px;">
                <button id="btnGenerateComment" class="primary">生成評語（整合AI）</button>

                <select id="engineSelect" style="
                    margin-left: 8px;
                    padding: 6px 10px;
                    border-radius: 999px;
                    border: 1px solid #d1d5db;
                    font-size: 14px;
                ">
                    <option value="gpt" selected>雲端ChatGPT</option>
                    <option value="local">地端（Ollama）</option>
                </select>
            </div>

            <!-- 載入狀態 -->
            <div id="loadingIndicator" style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(255,255,255,0.8);
                z-index: 9999;
                justify-content: center;
                align-items: center;
            ">
                <div style="
                    padding: 20px;
                    border-radius: 12px;
                    background-color: white;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                ">
                    <h3>正在生成評語...</h3>
                    <p>請稍等，AI正在思考中...</p>
                </div>
            </div>
        </div>

        <!-- 右側：評語預覽 & 下載 -->
        <div>
            <h3 class="section-header">
                <span>評語預覽：</span>
                <button id="btnClearComments" class="secondary">清除記錄</button>
            </h3>
            <div id="commentPreview" class="card preview-list"></div>

            <h3 style="margin-top: 20px;">下載</h3>
            <div class="download-area">
                <button id="btnDownloadTxt" class="secondary">下載 TXT</button>
                <button id="btnDownloadCsv" class="secondary">下載 CSV</button>
                <button id="btnDownloadWord" class="secondary">下載 WORD</button>
                <span class="badge">💾 不連資料庫，只存在你自己的瀏覽器</span>
            </div>
        </div>
    </div>
</div>
  <script defer src="{% static 'student/js/index.js' %}"></script>
</body>
</html>
