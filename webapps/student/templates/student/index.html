{% load static %}
{% load custom_tags %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>學生評語生成</title>
    <link rel="stylesheet" href="{% custom_static 'student/css/index.css' %}">
    <script defer src="{% custom_static 'portal/js/apiurl_factory.js' %}"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
    <link rel="icon" type="image/svg+xml" href="{% custom_static 'portal/img/favicon-ai.svg' %}?v=3">
    <link rel="shortcut icon" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
</head>
<body data-base-url="{{ request.script_name }}">
<div class="container">
    <h1>學生評語生成</h1>

    <div class="toolbar">
        <button id="btnSave" class="secondary">暫存設定</button>
        <button id="btnTogglePreview" class="secondary">顯示/隱藏預覽</button>
        <button id="btnResetAll" class="danger">全部重設</button>
    </div>

    <h3>學生名單（每行一位）</h3>
    <textarea id="studentList" placeholder="例：&#10;1.王小明&#10;2.林小華&#10;3.陳小美"></textarea>
    <div style="margin-top: 8px;">
        <input type="file" id="importFileInput" accept=".txt,.csv" style="display: none;">
        <button id="btnImportFile" class="secondary">匯入名單</button>
        <button id="btnGenerateStudents">建立學生按鈕</button>
    </div>

    <div id="studentButtons" class="student-buttons"></div>

    <div class="grid-2">
        <div>
            <h3 class="section-header">
                <span>特質選項</span>
                <button id="btnResetTraits" class="secondary">重置選擇</button>
            </h3>

            <div id="traitTabs" class="pill-list" style="margin: 10px 0 8px;">
                <button type="button" class="tab-btn selected" data-tab="all">全部</button>
                <button type="button" class="tab-btn" data-tab="aptitude">資質與態度</button>
                <button type="button" class="tab-btn" data-tab="character">個性與品德</button>
                <button type="button" class="tab-btn" data-tab="social">團體與人際</button>
                <button type="button" class="tab-btn" data-tab="talent">專長與才藝</button>
            </div>

            <div id="traitList" class="card pill-list"></div>

            <h3 class="section-header" style="margin-top: 16px;">
                <span>自訂特質（最多 20 項）</span>
                <button id="btnClearCustomTraits" class="secondary">清除自訂特質</button>
            </h3>
            <div class="card">
                <div class="inline-input">
                    <input type="text" id="customTraitInput" placeholder="輸入自訂特質後點新增">
                    <button id="btnAddCustomTrait">新增</button>
                </div>
                <div id="customTraitList" class="pill-list" style="margin-top: 10px;"></div>
                <div style="margin-top: 6px; font-size: 12px; color: #6b7280;">
                    已新增：<span id="customTraitCount">0</span> / 20
                </div>
            </div>

            <h3 class="section-header" style="margin-top: 16px;">
                <span>已選特質</span>
                <button id="btnClearSelectedTraits" class="secondary">清除已選特質</button>
            </h3>
            <div id="selectedTraits" class="card pill-list"></div>

            <div style="margin-top: 16px;">
                <button id="btnGenerateComment" class="primary">生成評語（整合 AI）</button>
                <select id="engineSelect" style="margin-left: 8px; padding: 6px 10px; border-radius: 999px; border: 1px solid #d1d5db; font-size: 14px;">
                    <option value="gpt" selected>使用 ChatGPT</option>
                    <option value="local">使用 Ollama</option>
                </select>
            </div>

            <div id="loadingIndicator" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center;">
                <div style="padding: 20px; border-radius: 12px; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h3>正在生成評語...</h3>
                    <p>請稍候，AI 生成中。</p>
                </div>
            </div>
        </div>

        <div>
            <h3 class="section-header">
                <span>評語預覽</span>
                <button id="btnClearComments" class="secondary">清空評語</button>
            </h3>
            <div id="commentPreview" class="card preview-list"></div>

            <h3 style="margin-top: 20px;">下載</h3>
            <div class="download-area">
                <button id="btnDownloadTxt" class="secondary">下載 TXT</button>
                <button id="btnDownloadCsv" class="secondary">下載 CSV</button>
                <button id="btnDownloadWord" class="secondary">下載 WORD</button>
                <span class="badge">下載檔案會含所有預覽評語</span>
            </div>
        </div>
    </div>
</div>
<script defer src="{% custom_static 'student/js/index.js' %}"></script>
</body>
</html>
