<div class="ai-bg ai-bg--{{ variant|default:'a' }}" aria-hidden="true">
  <svg class="ai-bg__layer ai-bg__layer--base" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <defs>
      <pattern id="aiMeshPattern" width="120" height="120" patternUnits="userSpaceOnUse">
        <path d="M120 0H0V120" class="ai-bg__mesh-line"></path>
      </pattern>
      <pattern id="aiDotPattern" width="80" height="80" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="1.4" class="ai-bg__mesh-dot"></circle>
      </pattern>
      <radialGradient id="aiGlowLeft" cx="0.06" cy="0.12" r="0.46">
        <stop offset="0%" stop-color="rgba(37, 99, 235, 0.16)"></stop>
        <stop offset="100%" stop-color="rgba(37, 99, 235, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiGlowRight" cx="0.9" cy="0.84" r="0.54">
        <stop offset="0%" stop-color="rgba(14, 116, 144, 0.16)"></stop>
        <stop offset="100%" stop-color="rgba(14, 116, 144, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiTriggerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(147, 232, 255, 0.92)"></stop>
        <stop offset="35%" stop-color="rgba(147, 232, 255, 0.35)"></stop>
        <stop offset="100%" stop-color="rgba(147, 232, 255, 0)"></stop>
      </radialGradient>
      <marker id="aiFlowArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <path d="M1 1L7 4L1 7Z" class="ai-bg__flow-arrow"></path>
      </marker>
    </defs>

    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiMeshPattern)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiDotPattern)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGlowLeft)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGlowRight)"></rect>
  </svg>

  <!-- A: 保守版，AI 中樞 + HUD + 低調手勢 -->
  <svg class="ai-bg__layer ai-bg__layer--a" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <!-- 左上：神經網路與模型連線 -->
    <g class="ai-bg__cluster ai-bg__cluster--network">
      <path d="M92 138L188 108L274 152L352 116L432 164" class="ai-bg__network-link"></path>
      <path d="M118 228L204 184L288 228L368 192L450 232" class="ai-bg__network-link"></path>
      <path d="M84 306L174 256L258 304L336 266L414 308" class="ai-bg__network-link ai-bg__network-link--soft"></path>
      <circle cx="92" cy="138" r="5" class="ai-bg__node"></circle>
      <circle cx="188" cy="108" r="5" class="ai-bg__node"></circle>
      <circle cx="274" cy="152" r="5" class="ai-bg__node"></circle>
      <circle cx="352" cy="116" r="5" class="ai-bg__node"></circle>
      <circle cx="432" cy="164" r="5" class="ai-bg__node"></circle>
      <circle cx="118" cy="228" r="4.6" class="ai-bg__node"></circle>
      <circle cx="204" cy="184" r="4.6" class="ai-bg__node"></circle>
      <circle cx="288" cy="228" r="4.6" class="ai-bg__node"></circle>
      <circle cx="368" cy="192" r="4.6" class="ai-bg__node"></circle>
      <circle cx="450" cy="232" r="4.6" class="ai-bg__node"></circle>
    </g>

    <!-- 右側：AI 核心與 HUD 控制環 -->
    <g class="ai-bg__cluster ai-bg__cluster--core">
      <circle cx="1548" cy="522" r="170" class="ai-bg__hud-ring"></circle>
      <circle cx="1548" cy="522" r="128" class="ai-bg__hud-ring ai-bg__hud-ring--inner"></circle>
      <circle cx="1548" cy="522" r="92" class="ai-bg__hud-ring ai-bg__hud-ring--core"></circle>
      <path d="M1398 522H1698M1548 372V672" class="ai-bg__hud-cross"></path>
      <path d="M1464 404A136 136 0 0 1 1668 470" class="ai-bg__hud-arc"></path>
      <path d="M1432 588A136 136 0 0 0 1672 602" class="ai-bg__hud-arc ai-bg__hud-arc--soft"></path>

      <rect x="1496" y="470" width="104" height="104" rx="18" class="ai-bg__chip-frame"></rect>
      <rect x="1524" y="498" width="48" height="48" rx="10" class="ai-bg__chip-inner"></rect>
      <path d="M1510 522H1586M1548 484V560" class="ai-bg__chip-mark"></path>
      <path d="M1496 486h-18M1496 514h-18M1496 542h-18M1600 486h18M1600 514h18M1600 542h18" class="ai-bg__chip-pin"></path>
    </g>

    <!-- 左下：資料推理流程 -->
    <g class="ai-bg__cluster ai-bg__cluster--flow">
      <path d="M88 898H220L282 860H398L456 896H584" class="ai-bg__flow-line" marker-end="url(#aiFlowArrow)"></path>
      <rect x="114" y="874" width="68" height="19" rx="8" class="ai-bg__flow-stage"></rect>
      <rect x="300" y="838" width="70" height="19" rx="8" class="ai-bg__flow-stage"></rect>
      <rect x="474" y="872" width="72" height="19" rx="8" class="ai-bg__flow-stage"></rect>
      <circle cx="252" cy="883" r="8" class="ai-bg__flow-node"></circle>
      <path d="M248 883h8M252 879v8" class="ai-bg__flow-node-mark"></path>
    </g>

    <!-- 右下：淡化手勢輪廓 -->
    <g class="ai-bg__cluster ai-bg__cluster--hand-soft">
      <path d="M1910 926C1824 856 1738 790 1670 724C1618 674 1576 632 1518 592" class="ai-bg__hand-stroke"></path>
      <path d="M1516 592C1488 572 1468 548 1450 532" class="ai-bg__hand-stroke ai-bg__hand-stroke--finger"></path>
      <circle cx="1450" cy="532" r="24" class="ai-bg__trigger-dot"></circle>
    </g>
  </svg>

  <!-- B: 強化版，增加人手觸發與操作台語意 -->
  <svg class="ai-bg__layer ai-bg__layer--b" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <!-- 人手觸控輪廓（非寫實） -->
    <g class="ai-bg__cluster ai-bg__cluster--hand-strong">
      <path d="M1918 874C1826 804 1748 744 1688 680C1630 620 1588 586 1544 556C1514 536 1494 518 1474 496" class="ai-bg__hand-outline"></path>
      <path d="M1474 496C1456 480 1440 468 1426 454" class="ai-bg__hand-outline ai-bg__hand-outline--finger"></path>
      <path d="M1588 668C1628 702 1680 744 1738 792" class="ai-bg__hand-outline ai-bg__hand-outline--palm"></path>
      <circle cx="1426" cy="454" r="64" class="ai-bg__trigger-glow"></circle>
      <circle cx="1426" cy="454" r="7.2" class="ai-bg__trigger-core"></circle>
    </g>

    <!-- 右上：AI 控制台 HUD 刻度 -->
    <g class="ai-bg__cluster ai-bg__cluster--hud-panel">
      <path d="M1324 156A282 282 0 0 1 1832 244" class="ai-bg__hud-track"></path>
      <path d="M1312 210A282 282 0 0 1 1820 300" class="ai-bg__hud-track ai-bg__hud-track--thin"></path>
      <path d="M1386 176L1400 214M1462 164L1472 204M1538 162L1542 202M1614 170L1612 210M1690 188L1682 226M1762 214L1748 248" class="ai-bg__hud-tick"></path>
    </g>

    <!-- 從觸發點往外的資料流 -->
    <g class="ai-bg__cluster ai-bg__cluster--token-flow">
      <path d="M1426 454C1328 418 1224 422 1132 468C1072 498 1010 536 934 550" class="ai-bg__token-flow"></path>
      <path d="M1426 454C1314 458 1212 506 1128 572C1076 612 1028 654 970 682" class="ai-bg__token-flow ai-bg__token-flow--soft"></path>
      <circle cx="1338" cy="436" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1236" cy="456" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1134" cy="500" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1058" cy="542" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1288" cy="486" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1180" cy="556" r="4.1" class="ai-bg__token-dot"></circle>
      <circle cx="1080" cy="620" r="4.1" class="ai-bg__token-dot"></circle>
    </g>
  </svg>
</div>
