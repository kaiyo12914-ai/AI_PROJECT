<div class="ai-bg ai-bg--{{ variant|default:'a' }}" aria-hidden="true">
  <svg class="ai-bg__layer ai-bg__layer--base" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <defs>
      <pattern id="aiGridSoft" width="128" height="128" patternUnits="userSpaceOnUse">
        <path d="M128 0H0V128" class="ai-bg__mesh-line"></path>
      </pattern>
      <pattern id="aiDotsSoft" width="86" height="86" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="1.2" class="ai-bg__mesh-dot"></circle>
      </pattern>

      <radialGradient id="aiLeftGlow" cx="0.12" cy="0.18" r="0.45">
        <stop offset="0%" stop-color="rgba(37, 99, 235, 0.20)"></stop>
        <stop offset="100%" stop-color="rgba(37, 99, 235, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiRightGlow" cx="0.88" cy="0.80" r="0.48">
        <stop offset="0%" stop-color="rgba(8, 145, 178, 0.19)"></stop>
        <stop offset="100%" stop-color="rgba(8, 145, 178, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiTouchGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(194, 244, 255, 0.95)"></stop>
        <stop offset="28%" stop-color="rgba(194, 244, 255, 0.33)"></stop>
        <stop offset="100%" stop-color="rgba(194, 244, 255, 0)"></stop>
      </radialGradient>
      <marker id="aiFlowArrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
        <path d="M1 1L8 4.5L1 8Z" class="ai-bg__flow-arrow"></path>
      </marker>
    </defs>

    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGridSoft)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiDotsSoft)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiLeftGlow)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiRightGlow)"></rect>
  </svg>

  <!-- A: conservative -->
  <svg class="ai-bg__layer ai-bg__layer--a" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <g class="ai-bg__cluster ai-bg__cluster--ai-hand">
      <path d="M78 312L192 284L286 304L372 286L468 312L564 300L666 322L768 352L878 370L1002 286" class="ai-bg__network-link"></path>
      <path d="M96 364L206 336L302 354L388 340L486 362L586 350L688 370L792 394L902 410L1008 300" class="ai-bg__network-link"></path>
      <path d="M122 418L232 392L328 410L420 396L514 420L612 412L712 438L812 462L904 474" class="ai-bg__network-link ai-bg__network-link--soft"></path>
      <path d="M188 474L302 452L404 466L510 484L612 504L716 526L820 548" class="ai-bg__network-link ai-bg__network-link--soft"></path>

      <circle cx="192" cy="284" r="4.2" class="ai-bg__node"></circle>
      <circle cx="372" cy="286" r="4.2" class="ai-bg__node"></circle>
      <circle cx="564" cy="300" r="4.2" class="ai-bg__node"></circle>
      <circle cx="768" cy="352" r="4.2" class="ai-bg__node"></circle>
      <circle cx="902" cy="410" r="4.2" class="ai-bg__node"></circle>
      <circle cx="1008" cy="300" r="4.4" class="ai-bg__node"></circle>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--human-hand">
      <path d="M1918 262C1780 258 1666 264 1560 286C1452 310 1364 342 1294 376C1238 404 1184 432 1128 454" class="ai-bg__hand-outline"></path>
      <path d="M1128 454C1098 466 1068 480 1036 494" class="ai-bg__hand-outline ai-bg__hand-outline--finger"></path>
      <path d="M1678 394C1766 388 1848 394 1918 406" class="ai-bg__hand-outline ai-bg__hand-outline--palm"></path>
      <path d="M1504 336C1462 338 1418 350 1380 372C1344 392 1316 418 1288 446" class="ai-bg__hand-outline ai-bg__hand-outline--palm"></path>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--touch-core">
      <circle cx="1030" cy="496" r="62" class="ai-bg__trigger-glow"></circle>
      <circle cx="1030" cy="496" r="6.4" class="ai-bg__trigger-core"></circle>

      <circle cx="1404" cy="690" r="144" class="ai-bg__hud-ring"></circle>
      <circle cx="1404" cy="690" r="108" class="ai-bg__hud-ring ai-bg__hud-ring--inner"></circle>
      <circle cx="1404" cy="690" r="78" class="ai-bg__hud-ring ai-bg__hud-ring--inner"></circle>
      <path d="M1260 690H1548M1404 546V834" class="ai-bg__hud-cross"></path>
      <path d="M1284 596A124 124 0 0 1 1506 632" class="ai-bg__hud-arc"></path>
      <path d="M1290 790A124 124 0 0 0 1512 770" class="ai-bg__hud-arc ai-bg__hud-arc--soft"></path>

      <rect x="1350" y="636" width="108" height="108" rx="18" class="ai-bg__chip-frame"></rect>
      <rect x="1380" y="666" width="48" height="48" rx="10" class="ai-bg__chip-core"></rect>
      <path d="M1366 690H1442M1404 652V728" class="ai-bg__chip-mark"></path>
      <path d="M1350 654h-16M1350 690h-16M1350 726h-16M1458 654h16M1458 690h16M1458 726h16" class="ai-bg__chip-pin"></path>

      <path d="M1030 496C1080 530 1152 576 1230 618C1294 652 1350 674 1404 690" class="ai-bg__token-flow"></path>
      <circle cx="1122" cy="552" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="1212" cy="606" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="1302" cy="650" r="4" class="ai-bg__token-dot"></circle>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--flow">
      <path d="M88 888H208L284 850H402L468 886H598" class="ai-bg__flow-line" marker-end="url(#aiFlowArrow)"></path>
      <rect x="110" y="864" width="72" height="20" rx="7" class="ai-bg__flow-stage"></rect>
      <rect x="304" y="832" width="74" height="20" rx="7" class="ai-bg__flow-stage"></rect>
      <rect x="486" y="862" width="76" height="20" rx="7" class="ai-bg__flow-stage"></rect>
      <circle cx="254" cy="874" r="8" class="ai-bg__flow-node"></circle>
      <path d="M250 874h8M254 870v8" class="ai-bg__flow-node-mark"></path>
    </g>
  </svg>

  <!-- B: enhanced -->

    <g class="ai-bg__cluster ai-bg__cluster--assistant-panel">
      <rect x="94" y="106" width="236" height="108" rx="14" class="ai-bg__assist-box"></rect>
      <path d="M120 136h182M120 160h150M120 184h116" class="ai-bg__assist-line"></path>
      <rect x="126" y="230" width="170" height="26" rx="10" class="ai-bg__assist-chip"></rect>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--trigger-flow">
      <path d="M1030 496C908 470 774 502 656 578C582 626 514 688 448 750" class="ai-bg__token-flow"></path>
      <path d="M1404 690C1298 730 1206 804 1128 896C1086 944 1044 990 996 1040" class="ai-bg__token-flow ai-bg__token-flow--soft"></path>
      <circle cx="930" cy="492" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="826" cy="520" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="722" cy="568" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="620" cy="642" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="1318" cy="738" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="1240" cy="806" r="4" class="ai-bg__token-dot"></circle>
      <circle cx="1168" cy="890" r="4" class="ai-bg__token-dot"></circle>
    </g>
  </svg>
</div>
