<div class="ai-bg ai-bg--{{ variant|default:'a' }}" aria-hidden="true">
  <svg class="ai-bg__layer ai-bg__layer--base" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <defs>
      <pattern id="aiGridDense" width="42" height="42" patternUnits="userSpaceOnUse">
        <path d="M42 0H0V42" class="ai-bg__grid-line"></path>
      </pattern>
      <pattern id="aiGridLight" width="84" height="84" patternUnits="userSpaceOnUse">
        <path d="M84 0H0V84" class="ai-bg__grid-line-light"></path>
      </pattern>

      <radialGradient id="aiCornerGlowTL" cx="0.05" cy="0.08" r="0.52">
        <stop offset="0%" stop-color="rgba(37, 99, 235, 0.22)"></stop>
        <stop offset="100%" stop-color="rgba(37, 99, 235, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiCornerGlowBR" cx="0.94" cy="0.9" r="0.56">
        <stop offset="0%" stop-color="rgba(15, 118, 110, 0.22)"></stop>
        <stop offset="100%" stop-color="rgba(15, 118, 110, 0)"></stop>
      </radialGradient>
      <linearGradient id="aiChipMetal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="rgba(30, 64, 175, 0.18)"></stop>
        <stop offset="100%" stop-color="rgba(30, 64, 175, 0.08)"></stop>
      </linearGradient>
      <linearGradient id="aiFlowStroke" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(14, 116, 144, 0.18)"></stop>
        <stop offset="50%" stop-color="rgba(37, 99, 235, 0.3)"></stop>
        <stop offset="100%" stop-color="rgba(14, 116, 144, 0.18)"></stop>
      </linearGradient>
      <marker id="aiArrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
        <path d="M1 1l7 3.5-7 3.5z" class="ai-bg__arrow-head"></path>
      </marker>
    </defs>

    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGridLight)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGridDense)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiCornerGlowTL)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiCornerGlowBR)"></rect>
  </svg>

      <rect x="108" y="105" width="290" height="30" rx="12" class="ai-bg__model-layer"></rect>
      <rect x="126" y="147" width="256" height="30" rx="12" class="ai-bg__model-layer"></rect>

      <circle cx="176" cy="316" r="4.3" class="ai-bg__token"></circle>

      <circle cx="1785" cy="760" r="8" class="ai-bg__neural-node ai-bg__neural-node--hub"></circle>
    </g>

    <!-- 左下：推理流程與決策節點 -->
