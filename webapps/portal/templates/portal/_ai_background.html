<div class="ai-bg ai-bg--{{ variant|default:'a' }}" aria-hidden="true">
  <svg class="ai-bg__layer ai-bg__layer--base" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <defs>
      <pattern id="aiGridLight" width="120" height="120" patternUnits="userSpaceOnUse">
        <path d="M120 0H0V120" class="ai-bg__grid-line"></path>
      </pattern>
      <pattern id="aiDotField" width="72" height="72" patternUnits="userSpaceOnUse">
        <circle cx="2.4" cy="2.4" r="1.4" class="ai-bg__grid-dot"></circle>
      </pattern>
      <radialGradient id="aiCornerGlowTL" cx="0.08" cy="0.08" r="0.45">
        <stop offset="0%" stop-color="rgba(37, 99, 235, 0.14)"></stop>
        <stop offset="100%" stop-color="rgba(37, 99, 235, 0)"></stop>
      </radialGradient>
      <radialGradient id="aiCornerGlowBR" cx="0.92" cy="0.9" r="0.5">
        <stop offset="0%" stop-color="rgba(14, 116, 144, 0.14)"></stop>
        <stop offset="100%" stop-color="rgba(14, 116, 144, 0)"></stop>
      </radialGradient>
      <linearGradient id="aiChipMetal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="rgba(30, 64, 175, 0.12)"></stop>
        <stop offset="100%" stop-color="rgba(30, 64, 175, 0.05)"></stop>
      </linearGradient>
      <linearGradient id="aiFlowStroke" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(14, 116, 144, 0.12)"></stop>
        <stop offset="50%" stop-color="rgba(37, 99, 235, 0.2)"></stop>
        <stop offset="100%" stop-color="rgba(14, 116, 144, 0.12)"></stop>
      </linearGradient>
      <marker id="aiArrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
        <path d="M1 1l7 3.5-7 3.5z" class="ai-bg__arrow-head"></path>
      </marker>
    </defs>

    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiGridLight)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiDotField)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiCornerGlowTL)"></rect>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#aiCornerGlowBR)"></rect>
  </svg>

  <!-- A: 保守版 -->
  <svg class="ai-bg__layer ai-bg__layer--a" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <g class="ai-bg__cluster ai-bg__cluster--model">

      <rect x="148" y="178" width="184" height="22" rx="9" class="ai-bg__model-layer"></rect>

      <circle cx="244" cy="276" r="3.6" class="ai-bg__token"></circle>
      <circle cx="320" cy="284" r="3.6" class="ai-bg__token"></circle>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--neural">
      <path d="M1406 772L1494 724M1406 772L1494 772M1406 772L1494 820" class="ai-bg__neural-link"></path>

      <circle cx="1406" cy="772" r="6.2" class="ai-bg__neural-node"></circle>
      <circle cx="1406" cy="850" r="6.2" class="ai-bg__neural-node"></circle>
      <circle cx="1494" cy="724" r="5.8" class="ai-bg__neural-node"></circle>
      <circle cx="1494" cy="772" r="5.8" class="ai-bg__neural-node"></circle>
      <circle cx="1494" cy="820" r="5.8" class="ai-bg__neural-node"></circle>
      <circle cx="1588" cy="700" r="5.6" class="ai-bg__neural-node"></circle>
      <circle cx="1588" cy="760" r="5.6" class="ai-bg__neural-node"></circle>
      <circle cx="1588" cy="820" r="5.6" class="ai-bg__neural-node"></circle>
      <circle cx="1588" cy="880" r="5.6" class="ai-bg__neural-node"></circle>
      <circle cx="1680" cy="744" r="6.6" class="ai-bg__neural-node ai-bg__neural-node--hub"></circle>
      <circle cx="1772" cy="776" r="7.4" class="ai-bg__neural-node ai-bg__neural-node--hub"></circle>
    </g>

    <g class="ai-bg__cluster ai-bg__cluster--inference">
      <path d="M96 900H236L294 862H410L468 900H590" class="ai-bg__pipeline" marker-end="url(#aiArrow)"></path>
      <rect x="120" y="876" width="70" height="20" rx="8" class="ai-bg__stage"></rect>
      <rect x="316" y="838" width="74" height="20" rx="8" class="ai-bg__stage"></rect>
      <rect x="486" y="876" width="76" height="20" rx="8" class="ai-bg__stage"></rect>
      <circle cx="266" cy="884" r="8.6" class="ai-bg__decision"></circle>
      <path d="M263 884h6M266 881v6" class="ai-bg__decision-mark"></path>
    </g>
  </svg>

  <!-- B: 強化版 -->
  <svg class="ai-bg__layer ai-bg__layer--b" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <g class="ai-bg__cluster ai-bg__cluster--chip">
      <rect x="1522" y="90" width="246" height="190" rx="22" class="ai-bg__panel"></rect>
      <rect x="1588" y="136" width="116" height="98" rx="12" class="ai-bg__chip-core"></rect>

      <path d="M1524 220H1456V264H1398" class="ai-bg__circuit"></path>

      <circle cx="1536" cy="956" r="4.4" class="ai-bg__brain-node"></circle>
      <circle cx="1600" cy="888" r="4.4" class="ai-bg__brain-node"></circle>
    </g>

      <circle cx="1266" cy="160" r="4" class="ai-bg__token-flow-dot"></circle>

      <circle cx="1670" cy="252" r="4" class="ai-bg__token-flow-dot"></circle>
    </g>
  </svg>
</div>
