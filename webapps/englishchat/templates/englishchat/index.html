{% load custom_tags %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美語學習教室</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
  <link rel="icon" type="image/svg+xml" href="{% custom_static 'portal/img/favicon-ai.svg' %}?v=3">
  <link rel="shortcut icon" href="{% custom_static 'portal/img/favicon-ai.png' %}?v=3">
  <link rel="stylesheet" href="{% custom_static 'englishchat/css/index.css' %}">
  <script defer src="{% custom_static 'portal/js/apiurl_factory.js' %}"></script>
  <script defer src="{% custom_static 'englishchat/js/speech_client.js' %}"></script>
  <script defer src="{% custom_static 'englishchat/js/index.js' %}"></script>
</head>
<body data-base-url="{{ request.script_name }}" data-debug-mode="{% if debug_mode %}1{% else %}0{% endif %}">
  <main class="wrap">
    <header class="top">
      <h1>美語學習教室</h1>
      <p>選擇主題與程度，開始和 AI 進行英語對話、填空、重組與翻譯練習。</p>
    </header>

    <section class="panel setup">
      <div class="setup-grid">
        <div class="row">
          <label for="topicSelect">練習主題</label>
          <select id="topicSelect">
            {% for t in topic_presets %}
              <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row">
          <label for="customTopic">自訂主題</label>
          <input id="customTopic" type="text" placeholder="留空可使用預設主題，或自行輸入想練習的情境">
        </div>
        <div class="row">
          <label for="levelSelect">程度</label>
          <select id="levelSelect">
            <option value="beginner">初級</option>
            <option value="intermediate">中級</option>
            <option value="advanced">高級</option>
          </select>
        </div>
      </div>
      <button id="startBtn" type="button">開始練習</button>
    </section>

    <section class="panel chat">
      <div class="mode-tabs" role="tablist" aria-label="practice modes">
        <button id="chatModeBtn" class="mode-tab active" type="button" data-mode="chat">Conversation</button>
        <button id="quizModeBtn" class="mode-tab" type="button" data-mode="quiz">Fill Blank</button>
        <button id="reorderModeBtn" class="mode-tab" type="button" data-mode="reorder">Reorder</button>
        <button id="translateModeBtn" class="mode-tab" type="button" data-mode="translate">Translate</button>
      </div>
      <div class="speech-tools">
        <button id="speakBtn" type="button">Speak</button>
        <button id="dictateBtn" type="button">Dictate</button>
        <button id="stopSpeechBtn" type="button">Stop</button>
        <span id="speechStatus" class="speech-status"></span>
      </div>
      <div id="chatLog" class="chat-log" aria-live="polite"></div>
      <div id="starterBox" class="starter-box"></div>
      <div id="hintBox" class="hint-box"></div>
      <div id="correctionBox" class="correction-box"></div>
      <div id="quizPanel" class="quiz-panel hidden" aria-live="polite">
        <div id="quizQuestion" class="quiz-question"></div>
        <div id="quizChoices" class="quiz-choices"></div>
        <div id="quizResult" class="quiz-result"></div>
        <button id="nextQuizBtn" type="button">Next question</button>
      </div>
      <div id="reorderPanel" class="practice-panel hidden" aria-live="polite">
        <div id="reorderPrompt" class="practice-prompt"></div>
        <div id="reorderAnswer" class="assembled-answer"></div>
        <div id="reorderWords" class="word-bank"></div>
        <div id="reorderResult" class="quiz-result"></div>
        <div class="practice-actions">
          <button id="clearReorderBtn" type="button">Clear</button>
          <button id="checkReorderBtn" type="button">Check</button>
          <button id="nextReorderBtn" type="button">Next question</button>
        </div>
      </div>
      <div id="translatePanel" class="practice-panel hidden" aria-live="polite">
        <div id="translatePrompt" class="practice-prompt"></div>
        <textarea id="translateInput" rows="3" placeholder="Type your English translation..."></textarea>
        <div id="translateResult" class="quiz-result"></div>
        <div id="translatePatterns" class="starter-box"></div>
        <div class="practice-actions">
          <button id="checkTranslateBtn" type="button">Check</button>
          <button id="nextTranslateBtn" type="button">Next question</button>
        </div>
      </div>
      <div class="summary-panel">
        <div class="summary-head">
          <strong>Session progress</strong>
          <button id="refreshSummaryBtn" type="button">Refresh</button>
        </div>
        <div id="summaryStats" class="summary-stats"></div>
        <div id="summaryAdvice" class="summary-advice"></div>
      </div>
      <div id="debugPanel" class="debug-panel hidden">
        <div class="debug-head">
          <strong>Debug log</strong>
          <button id="clearDebugBtn" type="button">Clear</button>
        </div>
        <div id="debugLog" class="debug-log" aria-live="polite"></div>
      </div>
      <div class="composer">
        <textarea id="userInput" rows="3" placeholder="輸入英文訊息..."></textarea>
        <div class="actions">
          <button id="stuckBtn" type="button">我卡住了</button>
          <button id="sendBtn" type="button">送出</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
