{% load custom_tags %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教學影片中心 - 影片詳情</title>
  <link rel="stylesheet" href="{% custom_static 'videolearning/css/videolearning.css' %}">
  <script defer src="{% custom_static 'portal/js/apiurl_factory.js' %}"></script>
  <script defer src="{% custom_static 'videolearning/js/videolearning.js' %}"></script>
  <style>
    .vl-player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .vl-progress-range {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }
    .vl-time-text {
      min-width: 84px;
      text-align: right;
      font-size: 12px;
      color: #4a5568;
    }
  </style>
</head>
<body data-base-url="{{ request.script_name }}" data-video-id="{{ video_id }}">
  <main class="vl-shell">
    <h1 id="detail-title">影片詳情</h1>
    <section class="vl-card">
      <video id="detail-player" controls style="width:100%;max-height:480px;background:#000;"></video>
      <div class="vl-player-controls">
        <button id="detail-fullscreen-btn" type="button" class="vl-btn-secondary">全螢幕</button>
        <input id="detail-progress" class="vl-progress-range" type="range" min="0" max="100" step="0.1" value="0" aria-label="播放進度">
        <span id="detail-time" class="vl-time-text">00:00 / 00:00</span>
      </div>
      <div class="vl-detail-info">
        <div class="vl-detail-row">
          <span class="vl-label">分類：</span>
          <span id="detail-category" class="vl-value">-</span>
          <span class="vl-spacer"></span>
          <span class="vl-label">標籤：</span>
          <span id="detail-tags" class="vl-value">-</span>
        </div>
        <div id="detail-meta" class="vl-item-meta"></div>
      </div>
      <hr class="vl-divider">
      <div style="margin-top:20px;">
        <a href="{% url 'videolearning:page' %}" class="vl-btn-secondary">返回清單</a>
      </div>
    </section>
  </main>
</body>
</html>
